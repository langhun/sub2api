openapi: 3.0.3
info:
  title: Sub2API Financial Hub API
  version: 1.0.0
  description: |
    Financial Hub V1 contract for Architecture Freeze v1.1.
    All monetary fields are transported as strings to preserve exact precision.
servers:
  - url: /api/v1
    description: Sub2API API root
tags:
  - name: financial-hub
    description: Financial Hub core contract
security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string
        reason:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        data:
          nullable: true

    PaginatedData:
      type: object
      required: [items, total, page, page_size, pages]
      properties:
        items:
          type: array
          items: {}
        total:
          type: integer
          format: int64
        page:
          type: integer
        page_size:
          type: integer
        pages:
          type: integer

    BankAccountSnapshot:
      type: object
      required:
        [account_id, balance, frozen_amount, credit_limit, debt_principal, debt_interest, total_debt, available_capacity, status, legacy_missing]
      properties:
        account_id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        balance:
          type: string
        frozen_amount:
          type: string
        credit_limit:
          type: string
        debt_principal:
          type: string
        debt_interest:
          type: string
        total_debt:
          type: string
        available_capacity:
          type: string
        version:
          type: integer
          format: int64
        status:
          type: string
          enum: [ACTIVE, FROZEN, CLOSED]
        legacy_missing:
          type: boolean
        updated_at:
          type: string
          format: date-time

    TransactionRecord:
      type: object
      required:
        [id, tx_id, user_id, account_id, tx_type, business_module, amount, balance_before, balance_after, frozen_before, frozen_after, credit_limit_snapshot, debt_snapshot, description, created_at]
      properties:
        id:
          type: integer
          format: int64
        tx_id:
          type: string
          format: uuid
        user_id:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        tx_type:
          type: string
          enum: [CONSUME, DEPOSIT, WITHDRAW, TRANSFER_OUT, TRANSFER_IN, SLOT_BET, SLOT_WIN, LOTTERY_BET, LOTTERY_WIN, LOAN_BORROW, LOAN_REPAY, LOAN_INTEREST, LEND_INVEST, LEND_PROFIT, REWARD, REFUND, FREEZE, UNFREEZE]
        business_module:
          type: string
          enum: [FINANCIAL_HUB, API_GATEWAY, PAYMENT, TRANSFER, GAME, LENDING, SYSTEM]
        amount:
          type: string
        balance_before:
          type: string
        balance_after:
          type: string
        frozen_before:
          type: string
        frozen_after:
          type: string
        credit_limit_snapshot:
          type: string
        debt_snapshot:
          type: string
        description:
          type: string
        reference_type:
          type: string
        reference_id:
          type: string
        request_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    TransferFundsRequest:
      type: object
      required: [user_id, amount, tx_type, business_module, description, idempotency_key]
      properties:
        user_id:
          type: integer
          format: int64
        amount:
          type: string
        tx_type:
          type: string
          enum: [CONSUME, DEPOSIT, WITHDRAW, TRANSFER_OUT, TRANSFER_IN, SLOT_BET, SLOT_WIN, LOTTERY_BET, LOTTERY_WIN, LOAN_BORROW, LOAN_REPAY, LOAN_INTEREST, LEND_INVEST, LEND_PROFIT, REWARD, REFUND, FREEZE, UNFREEZE]
        business_module:
          type: string
          enum: [FINANCIAL_HUB, API_GATEWAY, PAYMENT, TRANSFER, GAME, LENDING, SYSTEM]
        description:
          type: string
        idempotency_scope:
          type: string
        idempotency_key:
          type: string
        reference_type:
          type: string
        reference_id:
          type: string
        request_id:
          type: string
        metadata:
          type: object
          additionalProperties: true

    BatchTransferFundsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TransferFundsRequest'

    TransferFundsResult:
      type: object
      required: [tx_id, user_id, account_id, tx_type, business_module, amount, balance, frozen, debt_principal, debt_interest, total_debt, credit_limit, replayed]
      properties:
        tx_id:
          type: string
          format: uuid
        user_id:
          type: integer
          format: int64
        account_id:
          type: integer
          format: int64
        tx_type:
          type: string
        business_module:
          type: string
        amount:
          type: string
        balance:
          type: string
        frozen:
          type: string
        debt_principal:
          type: string
        debt_interest:
          type: string
        total_debt:
          type: string
        credit_limit:
          type: string
        replayed:
          type: boolean

    AdminBalanceAdjustmentRequest:
      type: object
      required: [user_id, operation, amount, idempotency_key]
      properties:
        user_id:
          type: integer
          format: int64
        operation:
          type: string
          enum: [set, add, subtract]
        amount:
          type: string
        description:
          type: string
        idempotency_key:
          type: string
        metadata:
          type: object
          additionalProperties: true

    LoanContractRequest:
      type: object
      required: [borrower_id, lender_type, principal, interest_rate, due_date]
      properties:
        borrower_id:
          type: integer
          format: int64
        lender_type:
          type: string
          enum: [PLATFORM, USER]
        lender_id:
          type: integer
          format: int64
        principal:
          type: string
        interest_rate:
          type: string
        due_date:
          type: string
          format: date-time
        request_id:
          type: string
        metadata:
          type: object
          additionalProperties: true

    LoanContractRecord:
      type: object
      required: [id, loan_id, borrower_id, lender_type, principal, interest_rate, accrued_interest, repaid_principal, repaid_interest, status, due_date, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        loan_id:
          type: string
          format: uuid
        borrower_id:
          type: integer
          format: int64
        lender_type:
          type: string
          enum: [PLATFORM, USER]
        lender_id:
          type: integer
          format: int64
        principal:
          type: string
        interest_rate:
          type: string
        accrued_interest:
          type: string
        repaid_principal:
          type: string
        repaid_interest:
          type: string
        status:
          type: string
          enum: [ACTIVE, REPAID, DEFAULTED, CANCELLED]
        due_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ReversalRequest:
      type: object
      required: [original_tx_id, reason]
      properties:
        original_tx_id:
          type: string
          format: uuid
        requested_by_user_id:
          type: integer
          format: int64
        approved_by_user_id:
          type: integer
          format: int64
        request_id:
          type: string
        reason:
          type: string
        metadata:
          type: object
          additionalProperties: true

    ReversalRecord:
      type: object
      required: [reversal_id, original_tx_id, reason, status, created_at]
      properties:
        id:
          type: integer
          format: int64
        reversal_id:
          type: string
          format: uuid
        original_tx_id:
          type: string
          format: uuid
        reversal_tx_id:
          type: string
          format: uuid
        requested_by_user_id:
          type: integer
          format: int64
        approved_by_user_id:
          type: integer
          format: int64
        request_id:
          type: string
        reason:
          type: string
        status:
          type: string
          enum: [PENDING, APPLIED, REJECTED, FAILED]
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        applied_at:
          type: string
          format: date-time

    ReconciliationRunRequest:
      type: object
      required: [run_date]
      properties:
        run_date:
          type: string
          format: date
        request_id:
          type: string
        metadata:
          type: object
          additionalProperties: true

    ReconciliationRunRecord:
      type: object
      required: [run_id, run_date, status, checked_transactions, checked_ledger_entries, mismatch_count, created_at]
      properties:
        id:
          type: integer
          format: int64
        run_id:
          type: string
          format: uuid
        run_date:
          type: string
          format: date
        status:
          type: string
          enum: [PENDING, RUNNING, COMPLETED, FAILED]
        checked_transactions:
          type: integer
          format: int64
        checked_ledger_entries:
          type: integer
          format: int64
        mismatch_count:
          type: integer
          format: int64
        summary:
          type: object
          additionalProperties: true
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    ReconciliationIssueRecord:
      type: object
      required: [issue_id, issue_type, expected_amount, actual_amount, detail, created_at]
      properties:
        id:
          type: integer
          format: int64
        issue_id:
          type: string
          format: uuid
        issue_type:
          type: string
          enum: [LEDGER_IMBALANCE, SNAPSHOT_DRIFT, MISSING_LEDGER_ENTRY, MISSING_TRANSACTION, DEBT_MISMATCH]
        tx_id:
          type: string
          format: uuid
        ledger_account_id:
          type: integer
          format: int64
        expected_amount:
          type: string
        actual_amount:
          type: string
        detail:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    AuditLogRecord:
      type: object
      required: [audit_id, action, actor_type, target_type, target_id, created_at]
      properties:
        id:
          type: integer
          format: int64
        audit_id:
          type: string
          format: uuid
        action:
          type: string
        actor_type:
          type: string
          enum: [SYSTEM, USER, ADMIN, JOB]
        actor_user_id:
          type: integer
          format: int64
        request_id:
          type: string
        tx_id:
          type: string
          format: uuid
        reversal_id:
          type: string
          format: uuid
        target_type:
          type: string
        target_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

paths:
  /financial-hub/accounts/{user_id}:
    get:
      tags: [financial-hub]
      summary: Get a bank account snapshot
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Account snapshot
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BankAccountSnapshot'

  /financial-hub/accounts/{user_id}/transactions:
    get:
      tags: [financial-hub]
      summary: List ledger-backed transaction records
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: tx_type
          schema:
            type: string
        - in: query
          name: business_module
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/PaginatedData'
                          - type: object
                            properties:
                              items:
                                type: array
                                items:
                                  $ref: '#/components/schemas/TransactionRecord'

  /financial-hub/transfers:
    post:
      tags: [financial-hub]
      summary: Apply one Financial Hub transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferFundsRequest'
      responses:
        '200':
          description: Transfer result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TransferFundsResult'

  /financial-hub/transfers:batch:
    post:
      tags: [financial-hub]
      summary: Apply multiple Financial Hub transactions in one database transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchTransferFundsRequest'
      responses:
        '200':
          description: Batch transfer results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TransferFundsResult'

  /financial-hub/admin-adjustments:
    post:
      tags: [financial-hub]
      summary: Apply an admin balance adjustment through Financial Hub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminBalanceAdjustmentRequest'
      responses:
        '200':
          description: Adjustment result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TransferFundsResult'

  /financial-hub/loans:
    post:
      tags: [financial-hub]
      summary: Create a loan contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanContractRequest'
      responses:
        '200':
          description: Loan contract
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoanContractRecord'

  /financial-hub/reversals:
    post:
      tags: [financial-hub]
      summary: Request or apply a transaction reversal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReversalRequest'
      responses:
        '200':
          description: Reversal result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReversalRecord'

  /financial-hub/reconciliation-runs:
    post:
      tags: [financial-hub]
      summary: Start one reconciliation run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconciliationRunRequest'
      responses:
        '200':
          description: Reconciliation run
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReconciliationRunRecord'

  /financial-hub/reconciliation-runs/{run_id}:
    get:
      tags: [financial-hub]
      summary: Get one reconciliation run
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reconciliation run
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReconciliationRunRecord'

  /financial-hub/reconciliation-runs/{run_id}/issues:
    get:
      tags: [financial-hub]
      summary: List reconciliation issues
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated reconciliation issues
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/PaginatedData'
                          - type: object
                            properties:
                              items:
                                type: array
                                items:
                                  $ref: '#/components/schemas/ReconciliationIssueRecord'

  /financial-hub/audit-logs:
    get:
      tags: [financial-hub]
      summary: List financial audit logs
      parameters:
        - in: query
          name: tx_id
          schema:
            type: string
            format: uuid
        - in: query
          name: target_type
          schema:
            type: string
        - in: query
          name: target_id
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated audit logs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/PaginatedData'
                          - type: object
                            properties:
                              items:
                                type: array
                                items:
                                  $ref: '#/components/schemas/AuditLogRecord'
