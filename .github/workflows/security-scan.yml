name: Security Scan

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  backend-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.3'
      - name: Run govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        working-directory: frontend
        run: |
          pnpm audit --prod --audit-level=high --json > audit.json || true
      - name: Check audit exceptions
        run: |
          python tools/check_pnpm_audit_exceptions.py \
            --audit frontend/audit.json \
            --exceptions .github/audit-exceptions.yml

  perf-baseline-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '2.0.0'
      - name: Run k6 perf baseline smoke
        env:
          BASE_URL: http://127.0.0.1:18080
          K6_VUS: '1'
          K6_DURATION: 10s
          K6_TIMEOUT: 2s
        run: |
          set -euo pipefail

          python3 - <<'PY' &
          import json
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      body = json.dumps({'status': 'ok'}).encode()
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('Content-Length', str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                      return

                  self.send_response(404)
                  self.end_headers()

              def log_message(self, format, *args):
                  return

          HTTPServer(('127.0.0.1', 18080), Handler).serve_forever()
          PY

          server_pid=$!
          trap 'kill "$server_pid" >/dev/null 2>&1 || true' EXIT

          python3 - <<'PY'
          import json
          import time
          import urllib.request

          url = 'http://127.0.0.1:18080/health'

          for _ in range(20):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      payload = json.loads(response.read().decode())

                  if payload.get('status') == 'ok':
                      break
              except Exception:
                  time.sleep(0.5)
          else:
              raise SystemExit('mock health server did not become ready')
          PY

          k6 run tools/perf/k6/health.js
