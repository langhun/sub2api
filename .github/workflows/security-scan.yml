name: Security Scan

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  backend-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.3'
      - name: Run govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        working-directory: frontend
        run: |
          pnpm audit --prod --audit-level=high --json > audit.json || true
      - name: Check audit exceptions
        run: |
          python tools/check_pnpm_audit_exceptions.py \
            --audit frontend/audit.json \
            --exceptions .github/audit-exceptions.yml

  perf-baseline-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Set up k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '2.0.0'
      - name: Run k6 perf baseline smoke
        env:
          BASE_URL: http://127.0.0.1:18080
          K6_VUS: '1'
          K6_DURATION: 10s
          K6_TIMEOUT: 2s
        run: |
          set -euo pipefail

          artifact_dir="perf-smoke-artifacts"
          mkdir -p "$artifact_dir"

          python3 - <<'PY' &
          import json
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      body = json.dumps({'status': 'ok'}).encode()
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('Content-Length', str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                      return

                  if self.path == '/api/v1/public/pricing':
                      body = json.dumps({
                          'code': 0,
                          'data': {
                              'groups': [],
                          },
                      }).encode()
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('Content-Length', str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                      return

                  if self.path == '/api/v1/monitoring/summary':
                      body = json.dumps({
                          'code': 0,
                          'data': {
                              'groups': [],
                          },
                      }).encode()
                      self.send_response(200)
                      self.send_header('Content-Type', 'application/json')
                      self.send_header('Content-Length', str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                      return

                  self.send_response(404)
                  self.end_headers()

              def log_message(self, format, *args):
                  return

          HTTPServer(('127.0.0.1', 18080), Handler).serve_forever()
          PY

          server_pid=$!
          trap 'kill "$server_pid" >/dev/null 2>&1 || true' EXIT

          python3 - <<'PY'
          import json
          import time
          import urllib.request

          urls = [
              ('http://127.0.0.1:18080/health', lambda payload: payload.get('status') == 'ok'),
              ('http://127.0.0.1:18080/api/v1/public/pricing', lambda payload: payload.get('code') == 0 and isinstance(payload.get('data', {}).get('groups'), list)),
              ('http://127.0.0.1:18080/api/v1/monitoring/summary', lambda payload: payload.get('code') == 0 and isinstance(payload.get('data', {}).get('groups'), list)),
          ]

          for _ in range(20):
              try:
                  for url, validator in urls:
                      with urllib.request.urlopen(url, timeout=1) as response:
                          payload = json.loads(response.read().decode())
                      if not validator(payload):
                          raise RuntimeError(f'invalid mock payload for {url}: {payload}')
                  break
              except Exception:
                  time.sleep(0.5)
          else:
              raise SystemExit('mock perf server did not become ready')
          PY

          set +e
          k6 run --summary-export "$artifact_dir/health-summary.json" tools/perf/k6/health.js \
            2>&1 | tee "$artifact_dir/health.log"
          health_status=${PIPESTATUS[0]}

          K6_DURATION=12s \
          MIXED_WEIGHT_HEALTH=60 \
          MIXED_WEIGHT_PRICING=30 \
          MIXED_WEIGHT_MONITORING_SUMMARY=10 \
          MIXED_PACE_MIN_MS=100 \
          MIXED_PACE_MAX_MS=250 \
          k6 run --summary-export "$artifact_dir/mixed-summary.json" tools/perf/k6/mixed.js \
            2>&1 | tee "$artifact_dir/mixed.log"
          mixed_status=${PIPESTATUS[0]}
          set -e

          cat > "$artifact_dir/metadata.txt" <<EOF
          base_url=$BASE_URL
          health_vus=$K6_VUS
          health_duration=$K6_DURATION
          health_timeout=$K6_TIMEOUT
          mixed_duration=12s
          mixed_weights=health:60,pricing:30,monitoring-summary:10
          mixed_pacing_ms=100-250
          health_exit_code=$health_status
          mixed_exit_code=$mixed_status
          EOF

          if [ "$mixed_status" -ne 0 ]; then
            echo "::warning::k6 mixed perf smoke failed but is non-blocking for security-scan.yml"
          fi

          exit "$health_status"

      - name: Upload perf smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-smoke-artifacts
          path: perf-smoke-artifacts/
          if-no-files-found: warn
          retention-days: 14
