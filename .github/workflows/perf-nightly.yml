name: Perf Nightly

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override target base URL'
        required: false
        type: string
      k6_vus:
        description: 'Override K6_VUS'
        required: false
        default: '10'
        type: string
      k6_duration:
        description: 'Override K6_DURATION'
        required: false
        default: '5m'
        type: string
      k6_timeout:
        description: 'Override K6_TIMEOUT'
        required: false
        default: '5s'
        type: string
      k6_rps:
        description: 'Override K6_RPS (0 means unlimited)'
        required: false
        default: '0'
        type: string
      history_source:
        description: 'History source for trend comparison'
        required: false
        default: 'previous-run-artifact'
        type: choice
        options:
          - previous-run-artifact
          - artifact
          - path
          - none
      history_run_id:
        description: 'Workflow run id used when history_source=artifact'
        required: false
        type: string
      history_artifact_name:
        description: 'Exact artifact name when history_source=artifact; empty = auto-detect perf-nightly-trend-*'
        required: false
        type: string
      history_csv_path:
        description: 'Workspace-relative or absolute CSV path when history_source=path'
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: perf-nightly
  cancel-in-progress: false

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Resolve nightly config
        id: resolve
        env:
          INPUT_BASE_URL: ${{ inputs.base_url }}
          INPUT_K6_VUS: ${{ inputs.k6_vus }}
          INPUT_K6_DURATION: ${{ inputs.k6_duration }}
          INPUT_K6_TIMEOUT: ${{ inputs.k6_timeout }}
          INPUT_K6_RPS: ${{ inputs.k6_rps }}
          PERF_BASE_URL: ${{ vars.PERF_BASE_URL }}
          PERF_K6_VUS: ${{ vars.PERF_K6_VUS }}
          PERF_K6_DURATION: ${{ vars.PERF_K6_DURATION }}
          PERF_K6_TIMEOUT: ${{ vars.PERF_K6_TIMEOUT }}
          PERF_K6_RPS: ${{ vars.PERF_K6_RPS }}
          PERF_NIGHTLY_THRESHOLDS: ${{ vars.PERF_NIGHTLY_THRESHOLDS }}
          PERF_NIGHTLY_ENFORCE: ${{ vars.PERF_NIGHTLY_ENFORCE }}
        run: |
          set -euo pipefail

          pick() {
            local input_value="$1"
            local repo_value="$2"
            local default_value="$3"

            if [ -n "$input_value" ]; then
              printf '%s' "$input_value"
              return
            fi

            if [ -n "$repo_value" ]; then
              printf '%s' "$repo_value"
              return
            fi

            printf '%s' "$default_value"
          }

          BASE_URL="$(pick "${INPUT_BASE_URL:-}" "${PERF_BASE_URL:-}" "")"
          K6_VUS="$(pick "${INPUT_K6_VUS:-}" "${PERF_K6_VUS:-}" "10")"
          K6_DURATION="$(pick "${INPUT_K6_DURATION:-}" "${PERF_K6_DURATION:-}" "5m")"
          K6_TIMEOUT="$(pick "${INPUT_K6_TIMEOUT:-}" "${PERF_K6_TIMEOUT:-}" "5s")"
          K6_RPS="$(pick "${INPUT_K6_RPS:-}" "${PERF_K6_RPS:-}" "0")"
          ENFORCE_VALUE="${PERF_NIGHTLY_ENFORCE:-false}"
          DATE_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DATE_COMPACT="$(date -u +%Y%m%dT%H%M%SZ)"
          COMMIT_SHORT="${GITHUB_SHA::12}"
          BASE_URL_SOURCE="default"
          THRESHOLD_SOURCE="not_configured"
          THRESHOLD_SOURCE_LABEL="repository variable PERF_NIGHTLY_THRESHOLDS is empty"

          if [ -n "${INPUT_BASE_URL:-}" ]; then
            BASE_URL_SOURCE="workflow_dispatch input"
          elif [ -n "${PERF_BASE_URL:-}" ]; then
            BASE_URL_SOURCE="repository variable PERF_BASE_URL"
          fi

          if [ -n "${PERF_NIGHTLY_THRESHOLDS//[[:space:]]/}" ]; then
            THRESHOLD_SOURCE="env:PERF_NIGHTLY_THRESHOLDS"
            THRESHOLD_SOURCE_LABEL="repository variable PERF_NIGHTLY_THRESHOLDS"
          fi

          if [ -z "$BASE_URL" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "::error::Missing target base URL. Provide workflow input 'base_url' or configure repository variable PERF_BASE_URL."
              exit 1
            fi

            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=PERF_BASE_URL is not configured; nightly baseline skipped." >> "$GITHUB_OUTPUT"
            {
              echo "### Perf nightly skipped"
              echo
              echo "- Reason: \`PERF_BASE_URL\` is not configured."
              echo "- Configure repository variable \`PERF_BASE_URL\` and rerun, or use \`workflow_dispatch\` with \`base_url\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=${DATE_COMPACT}-${COMMIT_SHORT}" >> "$GITHUB_OUTPUT"
          echo "date_utc=$DATE_UTC" >> "$GITHUB_OUTPUT"
          echo "threshold_source=$THRESHOLD_SOURCE" >> "$GITHUB_OUTPUT"
          echo "enforce_value=$ENFORCE_VALUE" >> "$GITHUB_OUTPUT"

          {
            echo "BASE_URL=$BASE_URL"
            echo "K6_VUS=$K6_VUS"
            echo "K6_DURATION=$K6_DURATION"
            echo "K6_TIMEOUT=$K6_TIMEOUT"
            echo "K6_RPS=$K6_RPS"
            echo "PERF_NIGHTLY_ENFORCE=$ENFORCE_VALUE"
            echo "RUN_DATE_UTC=$DATE_UTC"
            echo "RAW_DIR=artifacts/perf-nightly/raw"
            echo "TREND_DIR=artifacts/perf-nightly/trend"
          } >> "$GITHUB_ENV"

          {
            echo "PERF_NIGHTLY_THRESHOLDS<<__EOF__"
            printf '%s\n' "${PERF_NIGHTLY_THRESHOLDS:-}"
            echo "__EOF__"
          } >> "$GITHUB_ENV"

          {
            echo "### Perf nightly config"
            echo
            echo "- Threshold source: \`$THRESHOLD_SOURCE\`"
            echo "- Threshold source detail: $THRESHOLD_SOURCE_LABEL"
            echo "- Enforce: \`$ENFORCE_VALUE\`"
            echo "- Base URL source: \`$BASE_URL_SOURCE\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve history config
        if: steps.resolve.outputs.skip != 'true'
        id: history_config
        env:
          INPUT_HISTORY_SOURCE: ${{ inputs.history_source }}
          INPUT_HISTORY_RUN_ID: ${{ inputs.history_run_id }}
          INPUT_HISTORY_ARTIFACT_NAME: ${{ inputs.history_artifact_name }}
          INPUT_HISTORY_CSV_PATH: ${{ inputs.history_csv_path }}
        run: |
          set -euo pipefail

          HISTORY_SOURCE="${INPUT_HISTORY_SOURCE:-previous-run-artifact}"
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            HISTORY_SOURCE="previous-run-artifact"
          fi

          HISTORY_RUN_ID="${INPUT_HISTORY_RUN_ID:-}"
          HISTORY_ARTIFACT_NAME="${INPUT_HISTORY_ARTIFACT_NAME:-}"
          HISTORY_CSV_PATH_INPUT="${INPUT_HISTORY_CSV_PATH:-}"
          HISTORY_DIR="artifacts/perf-nightly/history"
          INPUT_WARNING=''
          EFFECTIVE_EVENT_NAME="${GITHUB_EVENT_NAME}"

          if [ "$EFFECTIVE_EVENT_NAME" = "workflow_dispatch" ]; then
            EFFECTIVE_EVENT_NAME='workflow_dispatch'
          elif [ "$EFFECTIVE_EVENT_NAME" = "schedule" ]; then
            EFFECTIVE_EVENT_NAME='schedule'
          fi

          mkdir -p "$HISTORY_DIR"

          case "$HISTORY_SOURCE" in
            previous-run-artifact)
              if [ -n "$HISTORY_RUN_ID" ] || [ -n "$HISTORY_ARTIFACT_NAME" ] || [ -n "$HISTORY_CSV_PATH_INPUT" ]; then
                INPUT_WARNING='history_source=previous-run-artifact ignores history_run_id, history_artifact_name, and history_csv_path.'
              fi
              ;;
            artifact)
              if [ -n "$HISTORY_CSV_PATH_INPUT" ]; then
                INPUT_WARNING='history_source=artifact ignores history_csv_path.'
              fi
              ;;
            path)
              if [ -n "$HISTORY_RUN_ID" ] || [ -n "$HISTORY_ARTIFACT_NAME" ]; then
                INPUT_WARNING='history_source=path ignores history_run_id and history_artifact_name.'
              fi
              ;;
            none)
              if [ -n "$HISTORY_RUN_ID" ] || [ -n "$HISTORY_ARTIFACT_NAME" ] || [ -n "$HISTORY_CSV_PATH_INPUT" ]; then
                INPUT_WARNING='history_source=none ignores all history_* inputs.'
              fi
              ;;
          esac

          echo "history_dir=$HISTORY_DIR" >> "$GITHUB_OUTPUT"
          echo "source=$HISTORY_SOURCE" >> "$GITHUB_OUTPUT"
          echo "run_id=$HISTORY_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$HISTORY_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "csv_path_input=$HISTORY_CSV_PATH_INPUT" >> "$GITHUB_OUTPUT"
          echo "input_warning=$INPUT_WARNING" >> "$GITHUB_OUTPUT"
          echo "effective_event_name=$EFFECTIVE_EVENT_NAME" >> "$GITHUB_OUTPUT"

          if [ -n "$INPUT_WARNING" ]; then
            echo "::warning::$INPUT_WARNING"
          fi

          {
            echo "### Perf nightly history config"
            echo
            echo "- Source: \`$HISTORY_SOURCE\`"
            echo "- Current branch: \`${GITHUB_REF_NAME}\`"
            echo "- Current event type: \`$EFFECTIVE_EVENT_NAME\`"
            if [ -n "$HISTORY_RUN_ID" ]; then
              echo "- Requested run id: \`$HISTORY_RUN_ID\`"
            fi
            if [ -n "$HISTORY_ARTIFACT_NAME" ]; then
              echo "- Requested artifact: \`$HISTORY_ARTIFACT_NAME\`"
            fi
            if [ -n "$HISTORY_CSV_PATH_INPUT" ]; then
              echo "- Requested CSV path: \`$HISTORY_CSV_PATH_INPUT\`"
            fi
            if [ -n "$INPUT_WARNING" ]; then
              echo "- Input validation warning: $INPUT_WARNING"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve history artifact metadata
        if: ${{ steps.resolve.outputs.skip != 'true' && (steps.history_config.outputs.source == 'previous-run-artifact' || steps.history_config.outputs.source == 'artifact') }}
        id: history_artifact
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HISTORY_SOURCE: ${{ steps.history_config.outputs.source }}
          HISTORY_RUN_ID: ${{ steps.history_config.outputs.run_id }}
          HISTORY_ARTIFACT_NAME: ${{ steps.history_config.outputs.artifact_name }}
          EFFECTIVE_EVENT_NAME: ${{ steps.history_config.outputs.effective_event_name }}
        run: |
          set -euo pipefail

          github_api_get() {
            local path="$1"
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com${path}"
          }

          TARGET_RUN_ID="${HISTORY_RUN_ID:-}"
          TARGET_ARTIFACT_NAME="${HISTORY_ARTIFACT_NAME:-}"
          TARGET_RUN_EVENT=''
          TARGET_RUN_BRANCH=''
          SELECTION_REASON=''

          if [ "$HISTORY_SOURCE" = "previous-run-artifact" ]; then
            selection="$(
              github_api_get "/repos/${GITHUB_REPOSITORY}/actions/workflows/perf-nightly.yml/runs?status=completed&per_page=50" |
                node -e "const fs = require('node:fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); const current = String(process.env.GITHUB_RUN_ID || ''); const currentBranch = String(process.env.GITHUB_REF_NAME || ''); const currentEvent = String(process.env.EFFECTIVE_EVENT_NAME || ''); const runs = (data.workflow_runs || []).filter((item) => String(item.id) !== current && item.conclusion === 'success'); const sameBranchAndEvent = runs.find((item) => item.head_branch === currentBranch && item.event === currentEvent); const sameBranch = runs.find((item) => item.head_branch === currentBranch); const fallback = runs[0]; const selected = sameBranchAndEvent || sameBranch || fallback; if (!selected) process.exit(0); const reason = sameBranchAndEvent ? 'same_branch_and_event' : sameBranch ? 'same_branch_fallback' : 'latest_successful_fallback'; process.stdout.write([selected.id, selected.event || '', selected.head_branch || '', reason].join('|'));"
            )"

            if [ -n "$selection" ]; then
              IFS='|' read -r TARGET_RUN_ID TARGET_RUN_EVENT TARGET_RUN_BRANCH SELECTION_REASON <<< "$selection"
            fi
          fi

          if [ -z "$TARGET_RUN_ID" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "run_id=" >> "$GITHUB_OUTPUT"
            echo "artifact_name=" >> "$GITHUB_OUTPUT"
            echo "reason=no_history_run" >> "$GITHUB_OUTPUT"
            echo "run_branch=" >> "$GITHUB_OUTPUT"
            echo "run_event=" >> "$GITHUB_OUTPUT"
            echo "selection_reason=no_matching_successful_run" >> "$GITHUB_OUTPUT"
            echo "::warning::No history run available for source ${HISTORY_SOURCE}; continuing without history compare."
            exit 0
          fi

          if [ "$HISTORY_SOURCE" = "artifact" ]; then
            metadata="$(
              github_api_get "/repos/${GITHUB_REPOSITORY}/actions/runs/${TARGET_RUN_ID}" |
                node -e "const fs = require('node:fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write([(data.event || ''), (data.head_branch || '')].join('|'));"
            )"
            if [ -n "$metadata" ]; then
              IFS='|' read -r TARGET_RUN_EVENT TARGET_RUN_BRANCH <<< "$metadata"
            fi
            SELECTION_REASON='manual_run_id'
          fi

          if [ -z "$TARGET_ARTIFACT_NAME" ]; then
            TARGET_ARTIFACT_NAME="$(
              github_api_get "/repos/${GITHUB_REPOSITORY}/actions/runs/${TARGET_RUN_ID}/artifacts?per_page=100" |
                node -e "const fs = require('node:fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); const artifact = (data.artifacts || []).filter((item) => !item.expired && typeof item.name === 'string' && item.name.startsWith('perf-nightly-trend-')).sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))[0]; if (artifact) process.stdout.write(artifact.name);"
            )"
          fi

          if [ -z "$TARGET_ARTIFACT_NAME" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "run_id=$TARGET_RUN_ID" >> "$GITHUB_OUTPUT"
            echo "artifact_name=" >> "$GITHUB_OUTPUT"
            echo "reason=no_history_artifact" >> "$GITHUB_OUTPUT"
            echo "run_branch=$TARGET_RUN_BRANCH" >> "$GITHUB_OUTPUT"
            echo "run_event=$TARGET_RUN_EVENT" >> "$GITHUB_OUTPUT"
            echo "selection_reason=${SELECTION_REASON:-unknown}" >> "$GITHUB_OUTPUT"
            echo "::warning::No matching perf-nightly trend artifact found in run ${TARGET_RUN_ID}; continuing without history compare."
            exit 0
          fi

          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "run_id=$TARGET_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$TARGET_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "reason=ok" >> "$GITHUB_OUTPUT"
          echo "run_branch=$TARGET_RUN_BRANCH" >> "$GITHUB_OUTPUT"
          echo "run_event=$TARGET_RUN_EVENT" >> "$GITHUB_OUTPUT"
          echo "selection_reason=${SELECTION_REASON:-manual_artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Download history artifact
        if: ${{ steps.resolve.outputs.skip != 'true' && steps.history_artifact.outputs.available == 'true' }}
        id: history_download
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_RUN_ID: ${{ steps.history_artifact.outputs.run_id }}
          TARGET_ARTIFACT_NAME: ${{ steps.history_artifact.outputs.artifact_name }}
          HISTORY_DIR: ${{ steps.history_config.outputs.history_dir }}
        run: |
          set -euo pipefail

          github_api_get() {
            local path="$1"
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com${path}"
          }

          DOWNLOAD_DIR="${HISTORY_DIR}/download"
          mkdir -p "$DOWNLOAD_DIR"
          ZIP_PATH="${HISTORY_DIR}/history-artifact.zip"

          if ! artifact_response="$(github_api_get "/repos/${GITHUB_REPOSITORY}/actions/runs/${TARGET_RUN_ID}/artifacts?per_page=100")"; then
            echo "csv_path=" >> "$GITHUB_OUTPUT"
            echo "kind=" >> "$GITHUB_OUTPUT"
            echo "fallback_reason=download_failed" >> "$GITHUB_OUTPUT"
            echo "::warning::Failed to download history artifact ${TARGET_ARTIFACT_NAME} from run ${TARGET_RUN_ID}; continuing without history compare."
            exit 0
          fi

          ARCHIVE_DOWNLOAD_URL="$(
            printf '%s' "$artifact_response" |
              node -e "const fs = require('node:fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); const targetName = String(process.env.TARGET_ARTIFACT_NAME || ''); const artifact = (data.artifacts || []).find((item) => !item.expired && item.name === targetName); if (artifact?.archive_download_url) process.stdout.write(artifact.archive_download_url);"
          )"

          if [ -z "$ARCHIVE_DOWNLOAD_URL" ]; then
            echo "csv_path=" >> "$GITHUB_OUTPUT"
            echo "kind=" >> "$GITHUB_OUTPUT"
            echo "fallback_reason=download_failed" >> "$GITHUB_OUTPUT"
            echo "::warning::Failed to download history artifact ${TARGET_ARTIFACT_NAME} from run ${TARGET_RUN_ID}; continuing without history compare."
            exit 0
          fi

          if ! curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$ARCHIVE_DOWNLOAD_URL" \
            -o "$ZIP_PATH"; then
            echo "csv_path=" >> "$GITHUB_OUTPUT"
            echo "kind=" >> "$GITHUB_OUTPUT"
            echo "fallback_reason=download_failed" >> "$GITHUB_OUTPUT"
            echo "::warning::Failed to download history artifact ${TARGET_ARTIFACT_NAME} from run ${TARGET_RUN_ID}; continuing without history compare."
            exit 0
          fi

          if ! unzip -oq "$ZIP_PATH" -d "$DOWNLOAD_DIR"; then
            echo "csv_path=" >> "$GITHUB_OUTPUT"
            echo "kind=" >> "$GITHUB_OUTPUT"
            echo "fallback_reason=download_failed" >> "$GITHUB_OUTPUT"
            echo "::warning::Failed to download history artifact ${TARGET_ARTIFACT_NAME} from run ${TARGET_RUN_ID}; continuing without history compare."
            exit 0
          fi

          rm -f "$ZIP_PATH"

          HISTORY_CSV_FILE=''
          HISTORY_KIND=''

          if [ -f "$DOWNLOAD_DIR/perf-trend-history.csv" ]; then
            HISTORY_CSV_FILE="$DOWNLOAD_DIR/perf-trend-history.csv"
            HISTORY_KIND='history'
          elif [ -f "$DOWNLOAD_DIR/perf-trend.csv" ]; then
            HISTORY_CSV_FILE="$DOWNLOAD_DIR/perf-trend.csv"
            HISTORY_KIND='current'
          else
            HISTORY_CSV_FILE="$(find "$DOWNLOAD_DIR" -type f -name 'perf-trend-history.csv' | head -n 1 || true)"
            if [ -n "$HISTORY_CSV_FILE" ]; then
              HISTORY_KIND='history'
            else
              HISTORY_CSV_FILE="$(find "$DOWNLOAD_DIR" -type f -name 'perf-trend.csv' | head -n 1 || true)"
              if [ -n "$HISTORY_CSV_FILE" ]; then
                HISTORY_KIND='current'
              fi
            fi
          fi

          echo "csv_path=$HISTORY_CSV_FILE" >> "$GITHUB_OUTPUT"
          echo "kind=$HISTORY_KIND" >> "$GITHUB_OUTPUT"
          if [ -n "$HISTORY_CSV_FILE" ]; then
            echo "fallback_reason=download_ok" >> "$GITHUB_OUTPUT"
          else
            echo "fallback_reason=csv_not_found_inside_artifact" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve history CSV path
        if: ${{ steps.resolve.outputs.skip != 'true' && steps.history_config.outputs.source == 'path' }}
        id: history_path
        env:
          HISTORY_CSV_PATH_INPUT: ${{ steps.history_config.outputs.csv_path_input }}
        run: |
          set -euo pipefail

          if [ -z "${HISTORY_CSV_PATH_INPUT:-}" ]; then
            echo "csv_path=" >> "$GITHUB_OUTPUT"
            echo "fallback_reason=path_input_missing" >> "$GITHUB_OUTPUT"
            echo "::warning::history_source=path but no history_csv_path was provided; continuing without history compare."
            exit 0
          fi

          CANDIDATE_PATH="$HISTORY_CSV_PATH_INPUT"
          if [ ! -f "$CANDIDATE_PATH" ]; then
            echo "csv_path=" >> "$GITHUB_OUTPUT"
            echo "fallback_reason=path_not_found" >> "$GITHUB_OUTPUT"
            echo "::warning::History CSV path ${HISTORY_CSV_PATH_INPUT} does not exist; continuing without history compare."
            exit 0
          fi

          echo "csv_path=$CANDIDATE_PATH" >> "$GITHUB_OUTPUT"
          echo "fallback_reason=path_ok" >> "$GITHUB_OUTPUT"

      - name: Finalize history input
        if: steps.resolve.outputs.skip != 'true'
        id: history_final
        env:
          HISTORY_SOURCE: ${{ steps.history_config.outputs.source }}
          ARTIFACT_CSV_PATH: ${{ steps.history_download.outputs.csv_path }}
          ARTIFACT_KIND: ${{ steps.history_download.outputs.kind }}
          ARTIFACT_FALLBACK_REASON: ${{ steps.history_download.outputs.fallback_reason }}
          HISTORY_RUN_ID: ${{ steps.history_artifact.outputs.run_id }}
          HISTORY_RUN_BRANCH: ${{ steps.history_artifact.outputs.run_branch }}
          HISTORY_RUN_EVENT: ${{ steps.history_artifact.outputs.run_event }}
          HISTORY_SELECTION_REASON: ${{ steps.history_artifact.outputs.selection_reason }}
          HISTORY_ARTIFACT_NAME: ${{ steps.history_artifact.outputs.artifact_name }}
          HISTORY_ARTIFACT_REASON: ${{ steps.history_artifact.outputs.reason }}
          PATH_CSV_PATH: ${{ steps.history_path.outputs.csv_path }}
          PATH_FALLBACK_REASON: ${{ steps.history_path.outputs.fallback_reason }}
        run: |
          set -euo pipefail

          HISTORY_CSV_PATH=''
          HISTORY_NOTE='History compare disabled.'
          FALLBACK_REASON='disabled'

          case "$HISTORY_SOURCE" in
            previous-run-artifact|artifact)
              HISTORY_CSV_PATH="${ARTIFACT_CSV_PATH:-}"
              if [ -n "$HISTORY_CSV_PATH" ]; then
                HISTORY_NOTE="History compare enabled via artifact (${ARTIFACT_KIND:-csv})."
                FALLBACK_REASON='using_artifact_history'
              else
                if [ -n "${ARTIFACT_FALLBACK_REASON:-}" ] && [ "${ARTIFACT_FALLBACK_REASON}" != 'download_ok' ]; then
                  FALLBACK_REASON="$ARTIFACT_FALLBACK_REASON"
                elif [ -n "${HISTORY_ARTIFACT_REASON:-}" ] && [ "${HISTORY_ARTIFACT_REASON}" != 'ok' ]; then
                  FALLBACK_REASON="$HISTORY_ARTIFACT_REASON"
                else
                  FALLBACK_REASON='artifact_unavailable'
                fi
                HISTORY_NOTE="History artifact unavailable; falling back to current-run-only trend outputs. Reason: ${FALLBACK_REASON}."
              fi
              ;;
            path)
              HISTORY_CSV_PATH="${PATH_CSV_PATH:-}"
              if [ -n "$HISTORY_CSV_PATH" ]; then
                HISTORY_NOTE="History compare enabled via CSV path \`${HISTORY_CSV_PATH}\`."
                FALLBACK_REASON='using_path_history'
              else
                FALLBACK_REASON="${PATH_FALLBACK_REASON:-path_unavailable}"
                HISTORY_NOTE="History CSV path unavailable; falling back to current-run-only trend outputs. Reason: ${FALLBACK_REASON}."
              fi
              ;;
            none)
              HISTORY_NOTE='History compare disabled by configuration.'
              FALLBACK_REASON='disabled_by_input'
              ;;
          esac

          echo "HISTORY_CSV_PATH=$HISTORY_CSV_PATH" >> "$GITHUB_ENV"
          echo "csv_path=$HISTORY_CSV_PATH" >> "$GITHUB_OUTPUT"
          echo "fallback_reason=$FALLBACK_REASON" >> "$GITHUB_OUTPUT"
          if [ -n "$HISTORY_CSV_PATH" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo
            echo "- Final history source: \`${HISTORY_SOURCE}\`"
            echo "- History resolution: $HISTORY_NOTE"
            if [ "$HISTORY_SOURCE" = 'previous-run-artifact' ] || [ "$HISTORY_SOURCE" = 'artifact' ]; then
              if [ -n "${HISTORY_RUN_ID:-}" ]; then
                echo "- Selected history run: \`${HISTORY_RUN_ID}\`"
              fi
              if [ -n "${HISTORY_RUN_BRANCH:-}" ]; then
                echo "- Selected history branch: \`${HISTORY_RUN_BRANCH}\`"
              fi
              if [ -n "${HISTORY_RUN_EVENT:-}" ]; then
                echo "- Selected history event: \`${HISTORY_RUN_EVENT}\`"
              fi
              if [ -n "${HISTORY_SELECTION_REASON:-}" ]; then
                echo "- Selection basis: \`${HISTORY_SELECTION_REASON}\`"
              fi
              if [ -n "${HISTORY_ARTIFACT_NAME:-}" ]; then
                echo "- Selected history artifact: \`${HISTORY_ARTIFACT_NAME}\`"
              fi
            fi
            if [ -n "$HISTORY_CSV_PATH" ]; then
              echo "- Final history CSV path: \`${HISTORY_CSV_PATH}\`"
            else
              echo "- Final history CSV path: \`<none>\`"
            fi
            echo "- Final fallback reason: \`${FALLBACK_REASON}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run k6 baseline scenarios
        if: steps.resolve.outputs.skip != 'true'
        env:
          AUTH_TOKEN: ${{ secrets.PERF_AUTH_TOKEN }}
          AUTH_HEADER: ${{ vars.PERF_AUTH_HEADER || 'Authorization' }}
          AUTH_SCHEME: ${{ vars.PERF_AUTH_SCHEME || 'Bearer' }}
          EXTRA_HEADERS: ${{ vars.PERF_EXTRA_HEADERS || '' }}
          EXPECTED_STATUS: ${{ vars.PERF_EXPECTED_STATUS || '200' }}
          SUMMARY_TREND_STATS: avg,min,med,max,p(50),p(95),p(99)
          K6_INSECURE_SKIP_TLS_VERIFY: ${{ vars.PERF_K6_INSECURE_SKIP_TLS_VERIFY || 'false' }}
        run: |
          set -euo pipefail

          mkdir -p "$RAW_DIR"
          scenarios=(health pricing monitoring-summary mixed)

          cat > "$RAW_DIR/run-metadata.json" <<EOF
          {
            "date": "${RUN_DATE_UTC}",
            "commit": "${GITHUB_SHA}",
            "base_url": "${BASE_URL}",
            "vus": "${K6_VUS}",
            "duration": "${K6_DURATION}",
            "timeout": "${K6_TIMEOUT}",
            "rps": "${K6_RPS}",
            "github_run_id": "${GITHUB_RUN_ID}",
            "github_run_number": "${GITHUB_RUN_NUMBER}",
            "github_ref_name": "${GITHUB_REF_NAME}"
          }
          EOF

          for scenario in "${scenarios[@]}"; do
            script_path="tools/perf/k6/${scenario}.js"
            summary_path="$RAW_DIR/${scenario}.summary.json"
            log_path="$RAW_DIR/${scenario}.log"

            echo "::group::k6 ${scenario}"
            k6 run "$script_path" --summary-export "$summary_path" 2>&1 | tee "$log_path"
            echo "::endgroup::"
          done

      - name: Build trend markdown and csv
        if: ${{ always() && steps.resolve.outputs.skip != 'true' && hashFiles('artifacts/perf-nightly/raw/*.summary.json') != '' }}
        run: |
          set -euo pipefail
          mkdir -p "$TREND_DIR"
          cmd=(
            node tools/perf/export-k6-trend.mjs
            --input-dir "$RAW_DIR"
            --output-dir "$TREND_DIR"
            --metadata "$RAW_DIR/run-metadata.json"
          )

          if [ -n "${HISTORY_CSV_PATH:-}" ]; then
            cmd+=(--history-csv "$HISTORY_CSV_PATH")
          fi

          "${cmd[@]}"

      - name: Evaluate perf thresholds
        if: ${{ always() && steps.resolve.outputs.skip != 'true' && hashFiles('artifacts/perf-nightly/trend/perf-threshold-report.json') != '' }}
        run: |
          set -euo pipefail
          node tools/perf/check-threshold-report.mjs \
            --report "$TREND_DIR/perf-threshold-report.json" \
            --enforce "${PERF_NIGHTLY_ENFORCE:-false}"

      - name: Build stability summary
        if: ${{ always() && steps.resolve.outputs.skip != 'true' && hashFiles('artifacts/perf-nightly/trend/perf-trend.csv') != '' }}
        run: |
          set -euo pipefail
          STABILITY_INPUT="$TREND_DIR/perf-trend.csv"
          if [ -f "$TREND_DIR/perf-trend-history.csv" ]; then
            STABILITY_INPUT="$TREND_DIR/perf-trend-history.csv"
          fi
          node tools/perf/summarize-trend-stability.mjs \
            --input "$STABILITY_INPUT" \
            --output-md "$TREND_DIR/perf-stability-summary.md" \
            --output-json "$TREND_DIR/perf-stability-summary.json" \
            --recent-runs 10

      - name: Attach trend summary to workflow
        if: ${{ always() && steps.resolve.outputs.skip != 'true' && hashFiles('artifacts/perf-nightly/trend/*') != '' }}
        run: |
          cat "$TREND_DIR/perf-trend.md" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "$TREND_DIR/perf-trend-latest.md" ]; then
            echo >> "$GITHUB_STEP_SUMMARY"
            cat "$TREND_DIR/perf-trend-latest.md" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo >> "$GITHUB_STEP_SUMMARY"
          cat "$TREND_DIR/perf-thresholds.md" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "$TREND_DIR/perf-stability-summary.md" ]; then
            echo >> "$GITHUB_STEP_SUMMARY"
            cat "$TREND_DIR/perf-stability-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload raw perf artifacts
        if: ${{ always() && steps.resolve.outputs.skip != 'true' && hashFiles('artifacts/perf-nightly/raw/*') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: perf-nightly-raw-${{ steps.resolve.outputs.artifact_suffix }}
          path: artifacts/perf-nightly/raw/
          if-no-files-found: error
          retention-days: 30

      - name: Upload trend artifacts
        if: ${{ always() && steps.resolve.outputs.skip != 'true' && hashFiles('artifacts/perf-nightly/trend/*') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: perf-nightly-trend-${{ steps.resolve.outputs.artifact_suffix }}
          path: artifacts/perf-nightly/trend/
          if-no-files-found: error
          retention-days: 30
